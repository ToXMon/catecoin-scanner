# Catecoin Multi-Scanner Configuration — World-Class Alpha Screener

# === Price Monitor ===
pair_address: "0xaC366079B95E56AA2dF22dE84373e47594dc1031"
chain: "robinhood"
chains_config_path: "chains.yaml"
active_chains: ["robinhood", "base"]
cate_token_address: "0xfc5ABD01E4Def799549eee154449Ff6a7ae0cAc7"

baseline_override: null
poll_interval_seconds: 60
thresholds: [100, 200, 500, 1000, -50]
price_alert_pct: 15.0  # Alert on 15%+ moves between polls

# === Alert Journal (SQLite + forward price tracking for LLM training) ===
journal:
  enabled: true
  db_path: "state/alert_journal.db"
  export_dir: "state/exports"
  re_alert_cooldown_hours: 24
  price_check_intervals: ["15m", "1h", "4h", "24h", "48h"]

# === Alchemy API (PRIMARY — replaces broken Blockscout address transfers) ===
alchemy:
  api_key: ""  # set ALCHEMY_API_KEY in the environment
  network: "robinhood-mainnet"
  cu_warning_threshold: 0.8  # Warn at 80% of monthly limit
  cu_monthly_limit: 30000000

# === Bitquery (DISABLED — Ory auth token is invalid for X-API-KEY) ===
bitquery:
  api_key: ""  # disabled; set BITQUERY_API_KEY in the environment if re-enabled
  enabled: false  # Auth failed; cannot use until valid Bitquery key is obtained
  reason: "Ory auth token is invalid for X-API-KEY header. Unauthorized."

# === Smart Money Tracking (holder-based detection) ===
smart_money:
  enabled: true
  poll_interval_seconds: 300
  wallets_file: "smart_wallets.json"
  consensus_strong_weight: 1.5
  consensus_moderate_weight: 0.8
  consensus_strong_30min: 2
  consensus_moderate_30min: 1
  min_wallet_score: 60  # Tightened: log weak observations, Telegram only stronger queue candidates
  blockscout_base: "https://robinhoodchain.blockscout.com/api/v2"

# === Token Discovery ===
discovery:
  enabled: true
  poll_interval_seconds: 600
  min_liquidity_usd: 10000
  min_volume_24h: 10000
  min_holders: 10
  zombie_dormancy_days: 7
  zombie_volume_spike_multiplier: 3.0
  blockscout_base: "https://robinhoodchain.blockscout.com/api/v2"
  alpha:
    min_alpha_score: 50
    max_age_hours: 24
    enable_derivative_filter: true
    enable_safety_check: true

# === Whale Monitor (NEW) ===
whale_monitor:
  enabled: true
  poll_interval_seconds: 300
  min_transfer_usd: 10000  # Alert on transfers > $10K
  tracked_tokens:
    - address: "0xfc5ABD01E4Def799549eee154449Ff6a7ae0cAc7"
      symbol: "CATE"
    - address: "0x35B5B9Bb84E9D1b3Bb9DcF6C3D9C8C6C7c5C7e5C"
      symbol: "CASHCAT"
  blockscout_base: "https://robinhoodchain.blockscout.com/api/v2"

# === Zombie Detector (NEW) ===
zombie_detector:
  enabled: true
  poll_interval_seconds: 1800  # 30 min
  min_dormancy_days: 7
  min_volume_spike_mult: 3.0
  min_liquidity_usd: 2000

# === Liquidity Flow Analyzer (NEW) ===
liquidity_flow:
  enabled: true
  poll_interval_seconds: 600  # 10 min
  change_threshold_pct: 10.0  # Alert on 10%+ liquidity changes
  tracked_tokens:
    - address: "0xfc5ABD01E4Def799549eee154449Ff6a7ae0cAc7"
      symbol: "CATE"
  blockscout_base: "https://robinhoodchain.blockscout.com/api/v2"

# === Robinhood Real-Time Runner Radar ===
runner_radar:
  enabled: true
  telegram_enabled: false
  telegram_min_queue_state: "entry_ready"
  warmup_no_alert_first_observation: true
  max_telegram_per_cycle: 3
  poll_interval_seconds: 120
  max_pairs: 40
  dexscreener_chain: "robinhood"
  search_queries: ["robinhood", "hood", "WETH robinhood", "USDG robinhood"]
  query_delay_seconds: 0.25
  transition_cooldown_hours: 24
  min_liquidity_candidate_usd: 25000
  min_liquidity_entry_usd: 50000
  min_holders_candidate: 100
  min_holders_entry: 300
  unknown_holders_score: 0
  min_volume_liquidity_ratio: 3.0
  watch_volume_liquidity_ratio: 1.0
  strong_h6_change_pct: 50
  strong_h24_change_pct: 75
  min_buy_pressure: 0.55
  min_5m_buys: 5
  min_1h_buys: 30
  dump_m5_change_pct: -10
  dump_h1_change_pct: -20
  candidate_score: 65
  entry_ready_score: 85

# === Base Chain Scanner (journal observations + conservative Telegram transitions) ===
base_scanner:
  enabled: true
  dry_run: false  # journal mode active; Telegram gated by telegram_enabled / BASE_SCANNER_TELEGRAM_ENABLED env
  poll_interval_seconds: 900
  max_pairs: 20
  observation_cooldown_hours: 6
  journal_db_path: "state/alert_journal.db"
  telegram_enabled: false  # set BASE_SCANNER_TELEGRAM_ENABLED=true in deployment env to enable Base entry_ready alerts
  telegram_min_queue_state: "entry_ready"  # override with BASE_SCANNER_TELEGRAM_MIN_STATE env

# === Queue/Telegram Policy (noise suppression) ===
# === Alert Self-Improvement Analyzer (4-hour cycle) ===
alert_analyzer:
  enabled: true
  interval_hours: 4
  min_alerts_for_analysis: 1
  auto_apply_thresholds: false  # data-driven threshold overrides written to scorer_adjustments.json for review
  outcome_windows: ["15m", "1h", "4h", "24h", "48h"]
  report_path: "state/analyzer_report.json"
  adjustments_path: "state/scorer_adjustments.json"

alert_policy:
  log_observations: true
  telegram_min_queue_state: "candidate"
  telegram_states: ["candidate", "entry_ready", "take_profit", "stop", "expired"]
  robinhood_min_alpha_score: 60
  robinhood_min_liquidity_usd: 10000
  robinhood_min_buy_value_usd: 500
  base_candidate_score: 60
  base_entry_ready_score: 75

# === Telegram ===
telegram_config_source: "robinhood-alpha"
robinhood_alpha_config_path: "/a0/usr/workdir/robinhood-alpha/config.yaml"

# === Alpha Quality Filters (NEW — Noise Suppression) ===
alpha:
  min_buy_value_usd: 500
  min_liquidity_usd: 10000
  min_liquidity_mcap_ratio: 0.1
  airdrop_blocklist:
    - "0x0000000000000000000000000000000000000000"

# === Reversal Detector (NEW) ===
reversal:
  enabled: true
  poll_interval_seconds: 900
  min_drop_pct: 20.0
  volume_spike_mult: 3.0
  check_smart_money: true
  min_liquidity_usd: 2000
  max_tokens_per_scan: 50
