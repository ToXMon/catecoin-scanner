---
version: "2.0"

services:
  catecoin-scanner:
    image: ghcr.io/toxmon/catecoin-scanner:latest
    env:
      # Inject at deployment — never commit secrets
      - TELEGRAM_BOT_TOKEN=REPLACE_WITH_BOT_TOKEN
      - TELEGRAM_CHAT_ID=REPLACE_WITH_CHAT_ID
    command:
      - "python"
      - "scanner.py"

profiles:
  compute:
    catecoin-scanner:
      resources:
        cpu:
          units: 0.2
        memory:
          size: 256Mi
        storage:
          size: 512Mi

  placement:
    akash:
      attributes:
        host: akash
      signedBy:
        anyOf:
          - "akash1365yvmc4s7awdyj3nksy0kasgvjplfjuhqy3nl"
      pricing:
        catecoin-scanner:
          denom: uakt
          amount: 1000

deployment:
  catecoin-scanner:
    akash:
      profile: catecoin-scanner
      count: 1
